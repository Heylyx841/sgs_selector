<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 1. 移动端极致适配：禁止缩放、禁止识别电话（防止评分被误认为电话号码） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    
    <title>武将均分与选将工具</title>
    
    <!-- 2. SEO 与项目描述 -->
    <meta name="description" content="三国杀武将均分与选将工具">
    <meta name="author" content="Heylyx841">

    <!-- 3. PWA (渐进式 Web 应用) 配置 -->
    <link rel="manifest" href="manifest.json">
    <!-- 系统任务栏颜色（金棕色边框色） -->
    <meta name="theme-color" content="#b5944b">

    <!-- 4. iOS (iPhone/iPad) 专用优化 -->
    <!-- 开启全屏模式（隐藏 Safari 底部工具栏） -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- 设置状态栏颜色（与主题色一致） -->
    <meta name="apple-mobile-web-app-status-bar-style" content="#b5944b">
    <!-- 桌面图标标签 (直接使用最高清的 1024px 图标) -->
    <link rel="apple-touch-icon" href="logo-1024.png">
    <!-- 桌面应用标题（安装后的图标下方的名字） -->
    <meta name="apple-mobile-web-app-title" content="武将均分">

    <!-- 5. 注册 Service Worker (实现安装提示功能) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Service Worker 注册成功:', reg);
                }).catch(err => {
                    console.log('Service Worker 注册失败:', err);
                });
            });
        }
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .main-content {
            flex: 1;
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="number"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s, opacity 0.3s;
            font-family: inherit;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 1 !important;
        }
        .back-btn {
            background-color: #95a5a6;
            margin-top: 20px;
        }
        .group-btn {
            margin-bottom: 15px;
            font-weight: bold;
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 400px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
            vertical-align: middle;
        }
        th {
            background-color: #f2f2f2;
        }
        .note {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 5px;
            line-height: 1.6;
        }
        .wiki-link {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        .wiki-link:hover {
            text-decoration: underline;
            color: #2980b9;
        }
        .action-cell {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .select-btn {
            width: auto;
            padding: 6px 12px;
            background-color: #e67e22;
            font-size: 14px;
            margin: 0;
            border-radius: 4px;
        }
        .select-btn:hover {
            background-color: #d35400;
        }
        /* 底部署名样式 */
        .footer {
            text-align: center;
            padding: 30px 0 10px 0;
            color: #95a5a6;
            font-size: 14px;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <h1>武将均分与选将工具</h1>

        <!-- 步骤1：设置与导入 -->
        <div id="setupView" class="container">
            <div class="form-group">
                <label for="nInput">请输入每堆分配的武将数 (N)：</label>
                <input type="number" id="nInput" min="1" value="10" placeholder="默认为 10">
            </div>
            <div class="form-group">
                <label for="xInput">请输入需要分成的堆数 (X)：</label>
                <input type="number" id="xInput" min="1" value="3" placeholder="默认为 3">
                <div id="xNote" class="note"></div>
            </div>
            <div class="form-group">
                <label for="csvFile">请上传CSV文件：</label>
                <input type="file" id="csvFile" accept=".csv">
                <div class="note">
                    ★ 格式要求：武将名,分数（无表头）。<br>
                    ★ 自动兼容 UTF-8 和 GB2312 编码。<br>
                    ★ 仅针对移动版武将优化，其他版本暂未适配。
                </div>
            </div>
            <button onclick="generate()">开始随机并均分</button>
        </div>

        <!-- 步骤2：分组列表及选将进度查看 -->
        <div id="groupsView" class="container" style="display: none;">
            <h2 id="groupTitle">选将阶段</h2>
            <p style="text-align: center; color: #7f8c8d;">请按照从上到下的顺序依次进入每一堆选择武将。</p>
            <div id="groupsList"></div>
            
            <div id="settlementBtnContainer" style="display: none; margin-top: 30px;">
                <button style="background-color: #e74c3c; font-size: 18px; font-weight: bold; padding: 15px;" onclick="showSettlement()">结算选将结果</button>
            </div>
            
            <button class="back-btn" onclick="startOver()">回到首页并重新开始</button>
        </div>

        <!-- 步骤3：单堆详情及选将操作 -->
        <div id="detailsView" class="container" style="display: none;">
            <h2 id="detailTitle">武将详情</h2>
            <div id="detailContent"></div>
            <!-- 用户进入此处必须选将，如果不选只能通过此按钮直接回滚到首页废弃本次生成 -->
            <button class="back-btn" onclick="startOver()">回到首页并重新开始</button>
        </div>

        <!-- 步骤4：最终选将结算展示 -->
        <div id="settlementView" class="container" style="display: none;">
            <h2>结算结果</h2>
            <p style="text-align: center; color: #7f8c8d;">以下是您从各堆中最终选择的武将阵容</p>
            <div id="settlementContent"></div>
            <button class="back-btn" onclick="startOver()">回到首页并重新开始</button>
        </div>
    </div>

    <!-- 规范署名区域 (全局固定在底部) -->
    <div class="footer">
        &copy; Heylyx841
    </div>

    <script>
        // === 核心数据存储 ===
        let allGenerals = [];
        let generatedGroups =[];
        
        // === 选将进度控制 ===
        let selectedGenerals =[]; 
        let currentGroupIndex = 0; 

        // === 工具函数：防御 XSS 攻击的 HTML 实体转义 ===
        function escapeHTML(str) {
            return String(str).replace(/[&<>'"]/g, function(tag) {
                const charsToReplace = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                };
                return charsToReplace[tag] || tag;
            });
        }

        // === 数据解析：统一提取文本解析逻辑 ===
        function parseCSVText(text) {
            let lines = text.split(/\r?\n/); 
            let uniqueGenerals = new Map();
            
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                let parts = line.split(',');
                if (parts.length >= 2) {
                    let name = parts[0].trim();
                    let score = parseFloat(parts[1].trim());
                    
                    if (name && !isNaN(score)) {
                        uniqueGenerals.set(name, score);
                    }
                }
            }

            let parsedList =[];
            uniqueGenerals.forEach((score, name) => {
                parsedList.push({ name: name, score: score });
            });
            return parsedList;
        }

        // === 界面更新：动态更新最大堆数(X)的提示及约束 ===
        function updateUIMaxLimits() {
            let n = parseInt(document.getElementById('nInput').value);
            if (isNaN(n) || n < 1) {
                document.getElementById('xNote').innerText = `请输入有效的每堆武将数(N)。`;
                return;
            }

            if (allGenerals.length === 0) {
                document.getElementById('xNote').innerText = `请先上传包含武将数据的 CSV 文件。`;
                document.getElementById('xInput').max = "";
                return;
            }

            let maxX = Math.floor(allGenerals.length / n);
            document.getElementById('xInput').max = maxX;
            document.getElementById('xNote').innerText = `注意：每堆将分配 ${n} 名武将。当前上传的库共解析到 ${allGenerals.length} 名武将，最多可分 ${maxX} 堆。`;
        }

        // 监听每堆人数输入框的变化，实时联动更新 X
        document.getElementById('nInput').addEventListener('input', updateUIMaxLimits);

        // 初始化加载（仅刷新提示）
        window.onload = function() {
            updateUIMaxLimits();
        };

        // 监听文件上传，自动识别 UTF-8 与 GB2312/GBK
        document.getElementById('csvFile').addEventListener('change', function(e) {
            let file = e.target.files[0];
            if (!file) {
                allGenerals =[]; 
                updateUIMaxLimits();
                return; 
            }

            let reader = new FileReader();
            reader.onload = function(e) {
                let buffer = e.target.result;
                let text = "";
                
                try {
                    let decoder = new TextDecoder('utf-8', {fatal: true});
                    text = decoder.decode(buffer);
                } catch (err) {
                    let decoder = new TextDecoder('gbk');
                    text = decoder.decode(buffer);
                }

                allGenerals = parseCSVText(text);
                updateUIMaxLimits();
                alert(`成功导入 ${allGenerals.length} 名武将！当前最多可分 ${document.getElementById('xInput').max} 堆。`);
            };
            reader.readAsArrayBuffer(file);
        });

        // === 1. 生成分组逻辑 ===
        function generate() {
            if (allGenerals.length === 0) {
                alert("错误：请先上传包含武将数据的 CSV 文件！");
                return;
            }

            let n = parseInt(document.getElementById('nInput').value);
            let x = parseInt(document.getElementById('xInput').value);
            
            if (isNaN(n) || n < 1) {
                alert("错误：每堆武将数 (N) 请输入正整数！");
                return;
            }

            let maxNum = Math.floor(allGenerals.length / n);

            if (isNaN(x) || x < 1 || x > maxNum) {
                alert(`错误：堆数 (X) 请输入 1 到 ${maxNum} 之间的正整数！（当前库总武将数：${allGenerals.length}）`);
                return;
            }

            let requiredCount = n * x;

            // 第一阶段洗牌：真随机打乱并截取前 N*X 个武将
            let shuffled = [...allGenerals];
            for (let i = shuffled.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            let selectedGeneralsList = shuffled.slice(0, requiredCount);

            // 极限优化算法均分武将
            generatedGroups = partitionGenerals(selectedGeneralsList, x, n);

            // 重置选将进度控制状态
            selectedGenerals = new Array(x).fill(null);
            currentGroupIndex = 0;

            // 渲染堆列表并切换视图
            renderGroupsList();
            document.getElementById('setupView').style.display = 'none';
            document.getElementById('groupsView').style.display = 'block';
        }

        // === 极致优化版爬山算法：均分使各堆分数平均 ===
        function partitionGenerals(generals, X, N) {
            // 先降序排序配合蛇形分配，能建立极其优秀的初始基准
            generals.sort((a, b) => b.score - a.score);
            let groups = Array.from({ length: X }, () =>[]);
            let sums = new Array(X).fill(0);

            for (let i = 0; i < generals.length; i++) {
                let round = Math.floor(i / X);
                let groupIdx = (round % 2 === 0) ? (i % X) : (X - 1 - (i % X));
                groups[groupIdx].push(generals[i]);
                sums[groupIdx] += generals[i].score;
            }

            // 若仅有 1 堆，直接返回无需优化计算
            if (X > 1) {
                let getDiff = () => Math.max(...sums) - Math.min(...sums);
                let currentDiff = getDiff();
                let noImprovementCount = 0; 

                for (let iter = 0; iter < 50000; iter++) {
                    // 【发版优化级】：解决浮点精度误差导致无法早停的隐患 (误差小于百万分之一即视为0)
                    if (currentDiff < 1e-6 || noImprovementCount > 5000) break; 

                    let g1 = Math.floor(Math.random() * X);
                    let g2 = Math.floor(Math.random() * X);
                    if (g1 === g2) continue;

                    let i1 = Math.floor(Math.random() * N);
                    let i2 = Math.floor(Math.random() * N);

                    let val1 = groups[g1][i1].score;
                    let val2 = groups[g2][i2].score;
                    
                    // 如果分数完全一样，交换毫无意义，跳过
                    if (val1 === val2) {
                        noImprovementCount++;
                        continue;
                    }

                    // 尝试交换分数并比对极差
                    sums[g1] = sums[g1] - val1 + val2;
                    sums[g2] = sums[g2] - val2 + val1;
                    let newDiff = getDiff();

                    if (newDiff < currentDiff) {
                        let temp = groups[g1][i1];
                        groups[g1][i1] = groups[g2][i2];
                        groups[g2][i2] = temp;
                        currentDiff = newDiff;
                        noImprovementCount = 0; // 差距变小，重置早停计数器
                    } else {
                        // 回退操作
                        sums[g1] = sums[g1] - val2 + val1;
                        sums[g2] = sums[g2] - val1 + val2;
                        noImprovementCount++; // 记录无效尝试
                    }
                }
            }

            // 二次洗牌：防规律偏移
            // 蛇形分配会导致高分武将集中在前几个堆，这里将各个堆整体作为元素进行顺序打乱
            for (let i = groups.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [groups[i], groups[j]] = [groups[j], groups[i]];
            }

            return groups;
        }

        // === 2. 渲染选将阶段堆列表（按顺序管控） ===
        function renderGroupsList() {
            let x = generatedGroups.length;
            let n = generatedGroups[0].length;
            
            document.getElementById('groupTitle').innerText = `选将阶段 (共 ${x} 堆)`;
            
            let groupsListHtml = '';
            for (let i = 0; i < x; i++) {
                let sum = generatedGroups[i].reduce((total, g) => total + g.score, 0);
                let avg = sum / n;
                
                if (i < currentGroupIndex) {
                    // 已选定武将的状态 (标绿，禁用) —— 隐去具体武将名，保持悬念
                    groupsListHtml += `<button class="group-btn" style="background-color: #2ecc71; cursor: not-allowed;" disabled>
                        第 ${i + 1} 堆 - 已完成选将
                    </button>`;
                } else if (i === currentGroupIndex) {
                    // 当前所处轮次状态 (亮蓝，可点)
                    groupsListHtml += `<button class="group-btn" style="background-color: #3498db;" onclick="showGroupDetail(${i})">
                        进入 第 ${i + 1} 堆 选将 (总分: ${sum.toFixed(2)} | 平均分: ${avg.toFixed(2)})
                    </button>`;
                } else {
                    // 尚未到达的轮次状态 (置灰，禁用)
                    groupsListHtml += `<button class="group-btn" style="background-color: #bdc3c7; cursor: not-allowed;" disabled>
                        第 ${i + 1} 堆 - 待解锁 (总分: ${sum.toFixed(2)} | 平均分: ${avg.toFixed(2)})
                    </button>`;
                }
            }
            document.getElementById('groupsList').innerHTML = groupsListHtml;

            // 检查是否全部选完，若选完则显示结算按钮
            if (currentGroupIndex >= x) {
                document.getElementById('settlementBtnContainer').style.display = 'block';
            } else {
                document.getElementById('settlementBtnContainer').style.display = 'none';
            }
        }

        // === 3. 显示单堆详情并准备选将 ===
        function showGroupDetail(groupIndex) {
            document.getElementById('groupsView').style.display = 'none';
            document.getElementById('detailsView').style.display = 'block';

            let group = generatedGroups[groupIndex];

            // 按严格要求排序：武将评分逆序 -> 分数相同则按照名字字典序/拼音正序
            group.sort((a, b) => {
                if (b.score !== a.score) {
                    return b.score - a.score;
                } else {
                    return a.name.localeCompare(b.name, 'zh-CN');
                }
            });

            let sum = group.reduce((total, g) => total + g.score, 0);
            let avg = sum / group.length;

            document.getElementById('detailTitle').innerText = `第 ${groupIndex + 1} 堆 武将名单`;

            let tableHtml = `<div class="table-responsive"><table>
                <tr>
                    <th style="width: 15%;">序号</th>
                    <th style="width: 30%;">武将</th>
                    <th style="width: 20%;">评分</th>
                    <th style="width: 35%;">操作</th>
                </tr>`;
            
            group.forEach((g, generalIndex) => {
                // 转义武将名避免XSS注入攻击
                let safeName = escapeHTML(g.name);
                let wikiUrl = `https://wiki.biligame.com/msgs/${encodeURIComponent(g.name)}`;
                
                tableHtml += `<tr>
                    <td>${generalIndex + 1}</td>
                    <td>${safeName}</td>
                    <td>${g.score}</td>
                    <td>
                        <div class="action-cell">
                            <a href="${wikiUrl}" target="_blank" class="wiki-link">查看WIKI</a>
                            <button class="select-btn" onclick="selectGeneral(${groupIndex}, ${generalIndex})">选择此将</button>
                        </div>
                    </td>
                </tr>`;
            });

            // 消除中间的割裂竖线
            tableHtml += `<tr>
                <td colspan="2" style="text-align:right; font-weight:bold; background-color: #f9f9f9; border-right: none;">本堆 总分 / 平均分：</td>
                <td colspan="2" style="font-weight:bold; background-color: #f9f9f9; border-left: none;">${sum.toFixed(2)} / ${avg.toFixed(2)}</td>
            </tr></table></div>`;

            document.getElementById('detailContent').innerHTML = tableHtml;
        }

        // === 4. 执行选将动作 ===
        function selectGeneral(groupIndex, generalIndex) {
            // 记录已选的武将
            selectedGenerals[groupIndex] = generatedGroups[groupIndex][generalIndex];
            // 进度推向下一堆
            currentGroupIndex++;
            
            // 重新渲染上一级的列表状态
            renderGroupsList();
            
            // 自动跳回堆列表界面
            document.getElementById('detailsView').style.display = 'none';
            document.getElementById('groupsView').style.display = 'block';
        }

        // === 5. 显示最终结算界面 ===
        function showSettlement() {
            document.getElementById('groupsView').style.display = 'none';
            document.getElementById('settlementView').style.display = 'block';

            let tableHtml = `<div class="table-responsive"><table>
                <tr>
                    <th style="width: 15%;">堆序号</th>
                    <th style="width: 30%;">武将</th>
                    <th style="width: 20%;">评分</th>
                    <th style="width: 35%;">操作</th>
                </tr>`;
            
            selectedGenerals.forEach((g, idx) => {
                let safeName = escapeHTML(g.name);
                let wikiUrl = `https://wiki.biligame.com/msgs/${encodeURIComponent(g.name)}`;
                
                tableHtml += `<tr>
                    <td>第 ${idx + 1} 堆</td>
                    <td style="font-weight: bold; color: #2ecc71;">${safeName}</td>
                    <td>${g.score}</td>
                    <td><a href="${wikiUrl}" target="_blank" class="wiki-link">查看WIKI</a></td>
                </tr>`;
            });

            tableHtml += `</table></div>`;
            document.getElementById('settlementContent').innerHTML = tableHtml;
        }

        // === 6. 统一的清空并重置返回主页函数 ===
        function startOver() {
            document.getElementById('groupsView').style.display = 'none';
            document.getElementById('detailsView').style.display = 'none';
            document.getElementById('settlementView').style.display = 'none';
            document.getElementById('setupView').style.display = 'block';
            // 回到首页不清空用户的N和X和已导入的CSV内存
            // 但下次点击"生成"时代码内部会彻底清空选将进度，实现纯净推演
        }
    </script>
</body>
</html>
